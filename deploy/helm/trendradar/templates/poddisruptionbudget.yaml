{{- if gt (int .Values.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "trendradar.fullname" . }}
  labels:
    {{- include "trendradar.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "trendradar.selectorLabels" . | nindent 6 }}
  maxUnavailable: 1
{{- end }}
