app:
    timezone: "Asia/Shanghai"
    show_version_update: false

schedule:
    enabled: false

platforms:
    enabled: true
    sources:
      - id: "baidu"
        name: "百度热搜"
      - id: "toutiao"
        name: "今日头条"
      - id: "weibo"
        name: "微博"
      - id: "zhihu"
        name: "知乎"
      - id: "thepaper"
        name: "澎湃新闻"
      - id: "wallstreetcn-hot"
        name: "华尔街见闻"
      - id: "cls-hot"
        name: "财联社"
      - id: "ifeng"
        name: "凤凰网"

rss:
    enabled: true
    freshness_filter:
      enabled: true
      max_age_days: 1
    feeds:
      - id: "peoples-daily"
        name: "人民日报"
        url: "http://www.people.com.cn/rss/politics.xml"
      - id: "scmp"
        name: "南华早报"
        url: "https://www.scmp.com/rss/91/feed"
      - id: "rest-of-world"
        name: "Rest of World"
        url: "https://restofworld.org/feed/"
      - id: "sinocism"
        name: "Sinocism"
        url: "https://sinocism.com/feed"
        max_age_days: 7

report:
    mode: "incremental"
    display_mode: "keyword"
    sort_by_position_first: false
    rank_threshold: 10
    max_news_per_keyword: 5

filter:
    method: "keyword"

display:
    region_order:
      - hotlist
      - rss
      - ai_analysis
    regions:
      hotlist: true
      new_items: false
      rss: true
      standalone: false
      ai_analysis: true

notification:
    enabled: true
    channels:
      feishu:
        webhook_url: ""

ai:
    model: "deepseek/deepseek-chat"
    api_key: ""
    timeout: 60
    temperature: 1.0
    max_tokens: 3000

ai_analysis:
    enabled: true
    language: "Chinese"
    mode: "follow_report"
    max_news_for_analysis: 80
    include_rss: true
    include_standalone: false
    include_rank_timeline: false

ai_translation:
    enabled: true
    language: "中文"
    scope:
      hotlist: false
      rss: true
      standalone: false

storage:
    backend: "auto"
    formats:
      sqlite: true
      txt: false
      html: true
    local:
      data_dir: "output"
      retention_days: 7

advanced:
    debug: false
    crawler:
      request_interval: 2000
      use_proxy: false
