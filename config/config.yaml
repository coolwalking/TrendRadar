# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 — HCI Brand Monitor
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Seoul"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening"     # 오전(출근) + 저녁(퇴근) 2회 리포트


# ===============================================================
# 플랫폼 — 한국 컨텍스트에서 중국 플랫폼은 불필요, 비활성화
# ===============================================================
platforms:
  enabled: false
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "zhihu"
      name: "知乎"


# ===============================================================
# RSS — 한국 금융·카드·마케팅·트렌드 소스
# ===============================================================
rss:
  enabled: true

  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    # ── 금융·카드 업계 ──────────────────────────────────────
    - id: "hankyung-finance"
      name: "한국경제 금융"
      url: "https://www.hankyung.com/feed/finance"

    - id: "mk-finance"
      name: "매일경제 금융"
      url: "https://rss.mk.co.kr/news/economyNews/"

    - id: "edaily"
      name: "이데일리"
      url: "https://www.edaily.co.kr/rss/News.xml"

    - id: "moneytoday"
      name: "머니투데이"
      url: "https://rss.mt.co.kr/news/latest"

    - id: "yonhap-economy"
      name: "연합뉴스 경제"
      url: "https://www.yonhapnews.co.kr/rss/economy.xml"

    - id: "newsis"
      name: "뉴시스"
      url: "https://www.newsis.com/rss/"

    # ── 마케팅·브랜드·디지털 ────────────────────────────────
    - id: "yna-culture"
      name: "연합뉴스 문화"
      url: "https://www.yonhapnews.co.kr/rss/culture.xml"

    - id: "hankookilbo"
      name: "한국일보"
      url: "https://www.hankookilbo.com/rss/news.xml"

    # ── 글로벌 비즈니스·마케팅 레퍼런스 ──────────────────────
    - id: "hbr"
      name: "Harvard Business Review"
      url: "https://hbr.org/stories.rss"
      max_age_days: 3

    - id: "adage"
      name: "Ad Age"
      url: "https://adage.com/feed"
      max_age_days: 2

    - id: "marketingweek"
      name: "Marketing Week"
      url: "https://www.marketingweek.com/feed/"
      max_age_days: 2


# ===============================================================
# 리포트
# ===============================================================
report:
  mode: "incremental"           # 새 항목만 → 중복 없는 클린 리포트
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 5


# ===============================================================
# 필터 — AI 방식 (키워드 대비 HCI 맥락 이해 우수)
# ===============================================================
filter:
  method: "ai"
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.6


# ===============================================================
# 표시 영역
# ===============================================================
display:
  region_order:
    - new_items
    - rss
    - ai_analysis

  regions:
    hotlist: false
    new_items: true
    rss: true
    standalone: false
    ai_analysis: true


# ===============================================================
# 알림 채널 — 사용할 채널 webhook/token 입력
# ===============================================================
notification:
  enabled: true

  channels:
    slack:
      webhook_url: ""           # Slack Incoming Webhook URL 입력

    email:
      from: ""                  # 발신 이메일
      password: ""              # 앱 비밀번호
      to: ""                    # 수신 이메일 (현대카드 주소 권장)
      smtp_server: ""
      smtp_port: ""

    telegram:
      bot_token: ""
      chat_id: ""

    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 저장소
# ===============================================================
storage:
  backend: "local"

  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 30


# ===============================================================
# AI 모델
# ===============================================================
ai:
  model: "anthropic/claude-haiku-4-5-20251001"   # 비용 효율 최적. 분석은 Sonnet으로 교체 가능.
  api_key: ""                                     # ANTHROPIC_API_KEY 환경변수 권장
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: ["anthropic/claude-sonnet-4-6"]


# ===============================================================
# AI 분석
# ===============================================================
ai_analysis:
  enabled: true
  language: "Korean"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 100
  include_rss: true
  include_standalone: false
  include_rank_timeline: false


# ===============================================================
# AI 번역
# ===============================================================
ai_translation:
  enabled: true
  language: "한국어"
  prompt_file: "ai_translation_prompt.txt"

  scope:
    hotlist: false
    rss: true
    standalone: false


# ===============================================================
# 고급 설정
# ===============================================================
advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
